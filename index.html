<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICT Melding — TechniGO!</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; background: #f5f5f3; color: #1a1a18; }
    .card { background: white; border-radius: 12px; padding: 28px; border: 1px solid #e0dfd8; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #e0dfd8; padding: 10px 0; font-size: 15px; }
    .label { color: #6b6b66; }
    .value { font-weight: 600; color: #0f6e56; }
    .btn { display: block; width: 100%; margin-top: 24px; padding: 14px; background: #0f6e56; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: 0.2s; }
    .btn:hover { background: #085041; transform: scale(1.02); }
    .footer { margin-top: 16px; font-size: 12px; color: #9b9b96; text-align: center; }
  </style>
</head>
<body>

<div class="card">
  <h1>Probleem melden</h1>
  <p style="color:#6b6b66;margin-bottom:20px;font-size:14px">
    Bevestig de locatie en klik op de knop om het defect door te geven aan de ICT-dienst.
  </p>

  <div class="info-row">
    <span class="label">Toestel/Type</span>
    <span class="value" id="display-inv">Zoeken...</span>
  </div>
  <div class="info-row">
    <span class="label">Lokaal / Locatie</span>
    <span class="value" id="display-lokaal">Zoeken...</span>
  </div>

  <a class="btn" id="final-link" href="#">
    Meldingsformulier Openen →
  </a>
  <p class="footer">TechniGO! — ICT Meldpunt</p>
</div>

<script>
  window.onload = function() {
    try {
      // 1. Gegevens uit de URL van de QR-code halen
      const params = new URLSearchParams(window.location.search);
      const inv    = params.get('inv')    || 'Algemeen';
      const lokaal = params.get('lokaal') || 'Onbekend lokaal';
      const type   = params.get('type')   || '';

      // 2. Tekst op het scherm tonen
      document.getElementById('display-inv').innerText = type + " " + inv;
      document.getElementById('display-lokaal').innerText = lokaal;

      // 3. De nieuwe link en de NIEUWE veld-ID's (r2de... en r7f0...)
      const base = "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=kjnh2hzODEa2eu8TTDGpyZuPt7g24ghFt1g3AGgjF61UQVgxN0xKUklRVEhENkhPRzNENldISjI4RS4u";
      
      // We gebruiken nu de codes uit jouw nieuwe 'pre-fill' link:
      const q1 = "&r2de732b858f74f308ec898befa8fa32b=" + encodeURIComponent(type + " " + inv);
      const q2 = "&r7f0c82aa790b4216b9cf5ca933f8de6a=" + encodeURIComponent(lokaal);

      document.getElementById('final-link').href = base + q1 + q2;
      
    } catch (err) {
      console.log("Foutje in script: ", err);
      document.getElementById('display-inv').innerText = "Fout bij laden";
    }
  };
</script>

</body>
</html>
